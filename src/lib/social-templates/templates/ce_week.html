<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:{{__width__}}px; height:{{__height__}}px; overflow:hidden; -webkit-font-smoothing:antialiased; }
  body {
    width:{{__width__}}px; height:{{__height__}}px;
    background:#191A2E; padding:64px 80px;
    display:flex; flex-direction:column;
    font-family:'Source Sans 3',system-ui,sans-serif;
    color:rgba(255,255,255,0.92);
  }
  .header { display:flex; align-items:center; justify-content:space-between; }
  .badge { font-size:24px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#BAF14D; }
  .range { font-family:'DM Mono',monospace; font-size:30px; font-weight:500; color:rgba(255,255,255,0.55); margin-bottom:10px; }
  .headline {
    font-family:'Bricolage Grotesque',serif; font-weight:800;
    font-size:84px; line-height:0.98; letter-spacing:-0.035em;
    margin:0; color:#fff;
  }
  .rows { margin-top:36px; display:flex; flex-direction:column; flex:1; }
  .footer {
    display:flex; align-items:center; justify-content:space-between;
    border-top:2px solid rgba(255,255,255,0.1); padding-top:26px; margin-top:8px;
  }
  .handle { font-size:26px; font-weight:600; color:rgba(255,255,255,0.85); }
  .cta {
    display:inline-flex; align-items:center; gap:12px;
    font-size:26px; font-weight:700; color:#BAF14D;
  }
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <svg viewBox="0 0 380 30" xmlns="http://www.w3.org/2000/svg" style="height:40px;display:block">
      <text y="24" font-family="'Trebuchet MS','Lucida Grande',Verdana,sans-serif" font-size="22" letter-spacing="0.3">
        <tspan fill="#52B788" font-weight="700">Green Streets</tspan><tspan fill="#FFFFFF" font-weight="400"> Initiative</tspan>
      </text>
    </svg>
    <span class="badge">{{badge_label}}</span>
  </div>

  <!-- Headline block -->
  <div style="margin-top:40px">
    <div class="range">{{week_range}}</div>
    <h2 class="headline">Get out<br>and move.</h2>
  </div>

  <!-- Event rows -->
  <div class="rows">
    {{events_html}}
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="handle">gogreenstreets.org/events</span>
    <span class="cta">
      Full calendar in bio
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#BAF14D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </span>
  </div>
</body>
</html>
