<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .template {
    width: 100%; height: 100%;
    position: relative; overflow: hidden;
  }

  /* Full-bleed photo background. We use object-fit: cover so any
     orientation works for any aspect ratio. */
  .photo {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Bottom gradient overlay covers 70% of image height; transitions
     from transparent at top to solid navy at bottom to guarantee
     legibility regardless of photo brightness (per spec §10) */
  .gradient-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 70%;
    background: linear-gradient(to top, var(--navy) 20%, color-mix(in srgb, var(--navy) 87%, transparent) 45%, transparent 100%);
    z-index: 1;
  }

  /* XP pill — top-right */
  .xp-pill {
    position: absolute;
    top: calc(var(--h) * 0.025);
    right: calc(var(--w) * 0.022);
    z-index: 3;
    background: var(--green);
    color: var(--navy);
    font-size: calc(var(--w) * 0.014);
    font-weight: 800;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
  }

  /* Logo area — top-left, on top of gradient */
  .logo-area {
    position: absolute;
    top: calc(var(--h) * 0.025);
    left: calc(var(--w) * 0.025);
    z-index: 3;
    display: flex; flex-direction: column; gap: 4px;
  }
  .shift-lockup { display: flex; align-items: center; gap: 7px; }
  .shift-lockup .word {
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    font-weight: 800;
    font-size: calc(var(--w) * 0.02);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.012);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
  .gsi-lead { display: none; flex-direction: column; gap: 6px; }
  .gsi-lead .gsi-wordmark { font-size: calc(var(--w) * 0.013); }
  .gsi-lead .shift-secondary { display: flex; align-items: center; gap: 4px; opacity: 0.85; }
  .gsi-lead .shift-secondary .word {
    font-size: calc(var(--w) * 0.012);
    color: var(--body);
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Body content — bottom */
  .content {
    position: absolute;
    left: calc(var(--w) * 0.025);
    right: calc(var(--w) * 0.025);
    bottom: calc(var(--h) * 0.04);
    z-index: 3;
  }
  .roam-tag {
    font-size: calc(var(--w) * 0.011);
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .roam-name {
    font-size: calc(var(--w) * 0.028);
    font-weight: 800;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.03em;
  }
  .roam-meta {
    display: flex; align-items: center; gap: 12px;
    margin-top: 10px;
  }
  .roam-meta-item {
    font-size: calc(var(--w) * 0.013);
    color: var(--body);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  /* Inline mode icon — sized via the surrounding font-size */
  .roam-meta-item .mode-icon {
    color: var(--green);
    font-size: calc(var(--w) * 0.016);
    line-height: 1;
  }
  .roam-meta-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--secondary);
  }
  .roam-description {
    font-size: calc(var(--w) * 0.014);
    color: var(--body);
    margin-top: 12px;
    line-height: 1.5;
  }

  .cta {
    display: none;
    margin-top: 14px;
    background: var(--green);
    color: var(--navy);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: calc(var(--w) * 0.012);
    font-weight: 700;
    align-self: flex-start;
    width: fit-content;
  }
  [data-platform="facebook"] .cta:not(:empty) { display: inline-flex; }
  [data-platform="linkedin"] .cta:not(:empty) { display: inline-flex; }

  /* Platform overrides */
  [data-platform="instagram"] .logo-area > .gsi-wordmark { display: none; }
  [data-platform="bluesky"]   .logo-area > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .logo-area > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .shift-lockup { display: none; }
  [data-platform="linkedin"]  .gsi-lead { display: flex; }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <img class="photo" src="{{photo}}" alt="" crossorigin="anonymous" />
    <div class="gradient-overlay"></div>

    <div class="xp-pill">{{xp_value}}</div>

    <div class="logo-area">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" width="26" height="20" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
      <div class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </div>
      <div class="gsi-lead">
        <div class="gsi-wordmark">
          <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
        </div>
        <div class="shift-secondary">
          <svg viewBox="0 0 36 28" width="13" height="10" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
            <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
          </svg>
          <span class="word">Shift</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="roam-tag">{{roam_tag}}</div>
      <div class="roam-name">{{roam_name}}</div>
      <div class="roam-meta">
        <span class="roam-meta-item"><span class="mode-icon">{{mode_icon}}</span>{{distance}}</span>
        <span class="roam-meta-dot"></span>
        <span class="roam-meta-item">{{route_label}}</span>
      </div>
      <div class="roam-description">{{description}}</div>
      <div class="cta">{{cta_text}}</div>
    </div>
  </div>
</body>
</html>
