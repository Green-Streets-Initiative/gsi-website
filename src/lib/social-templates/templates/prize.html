<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --leaf-white: #F4F8EE;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .template {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: calc(var(--h) * 0.06) calc(var(--w) * 0.05);
    position: relative; overflow: hidden;
  }

  /* Celebratory accents — green→blue→green stripe + centered radial */
  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--blue), var(--green));
  }
  .celebration-glow {
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 60%; height: 30%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(186,241,77,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Logo area */
  .logo-area { display: flex; flex-direction: column; gap: 4px; }
  .shift-lockup { display: flex; align-items: center; gap: 8px; }
  .shift-lockup .word {
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    font-weight: 800;
    font-size: calc(var(--w) * 0.022);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.013);
    letter-spacing: 0.5px;
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
  .gsi-lead { display: none; flex-direction: column; gap: 6px; }
  .gsi-lead .gsi-wordmark { font-size: calc(var(--w) * 0.014); }
  .gsi-lead .shift-secondary { display: flex; align-items: center; gap: 4px; opacity: 0.7; }
  .gsi-lead .shift-secondary .word {
    font-size: calc(var(--w) * 0.013);
    color: var(--body);
  }

  /* Prize tag — pushed to mid via margin-top:auto */
  .prize-tag {
    margin-top: auto;
    font-size: calc(var(--w) * 0.011);
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--green);
    text-transform: uppercase;
  }
  .prize-headline {
    font-size: calc(var(--w) * 0.03);
    font-weight: 800;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-top: 8px;
  }

  /* Funder credit — small logo + name + location */
  .funder {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .funder-logo {
    width: calc(var(--w) * 0.04);
    height: calc(var(--w) * 0.04);
    border-radius: 8px;
    background: var(--leaf-white);
    object-fit: contain;
    padding: 4px;
    flex-shrink: 0;
  }
  .funder-text-name {
    font-size: calc(var(--w) * 0.014);
    font-weight: 700;
    color: var(--body);
  }
  .funder-text-location {
    font-size: calc(var(--w) * 0.0115);
    color: var(--secondary);
    margin-top: 2px;
  }

  /* How to win card */
  .how {
    margin-top: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .how-label {
    font-size: calc(var(--w) * 0.011);
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .how-body {
    font-size: calc(var(--w) * 0.014);
    color: var(--body);
    line-height: 1.5;
  }

  .cta {
    display: none;
    margin-top: 14px;
    background: var(--green);
    color: var(--navy);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: calc(var(--w) * 0.012);
    font-weight: 700;
    align-self: flex-start;
  }
  [data-platform="facebook"] .cta:not(:empty) { display: inline-flex; }
  [data-platform="linkedin"] .cta:not(:empty) { display: inline-flex; }

  /* Footer — deadline + legal line */
  .footer {
    margin-top: auto;
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .deadline {
    font-size: calc(var(--w) * 0.013);
    font-weight: 700;
    color: var(--green);
    font-family: 'DM Mono', monospace;
  }
  .legal {
    font-size: calc(var(--w) * 0.0095);
    color: var(--attribution);
    font-family: 'DM Mono', monospace;
    text-align: right;
  }

  /* Platform overrides */
  [data-platform="instagram"] .logo-area > .gsi-wordmark { display: none; }
  [data-platform="bluesky"]   .logo-area > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .logo-area > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .shift-lockup { display: none; }
  [data-platform="linkedin"]  .gsi-lead { display: flex; }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>
    <div class="celebration-glow"></div>

    <div class="logo-area">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" width="28" height="22" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
      <div class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </div>
      <div class="gsi-lead">
        <div class="gsi-wordmark">
          <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
        </div>
        <div class="shift-secondary">
          <svg viewBox="0 0 36 28" width="14" height="11" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
            <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
          </svg>
          <span class="word">Shift</span>
        </div>
      </div>
    </div>

    <div class="prize-tag">{{prize_tag}}</div>
    <div class="prize-headline">{{prize_headline}}</div>

    <div class="funder">
      <img class="funder-logo" src="{{partner_logo}}" alt="" crossorigin="anonymous" />
      <div>
        <div class="funder-text-name">Funded by {{partner_name}}</div>
        <div class="funder-text-location">📍 {{partner_location}}</div>
      </div>
    </div>

    <div class="how">
      <div class="how-label">How to win</div>
      <div class="how-body">{{how_to_win}}</div>
    </div>

    <div class="cta">{{cta_text}}</div>

    <div class="footer">
      <span class="deadline">{{deadline}}</span>
      <span class="legal">{{legal_line}}</span>
    </div>
  </div>
</body>
</html>
