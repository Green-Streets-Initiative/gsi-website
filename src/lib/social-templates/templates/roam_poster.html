<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── tokens ── */
  :root {
    --navy: #191A2E; --navy-2: #20223A; --navy-3: #15162a;
    --soft-white: #E8E8EE; --soft-white-2: #CBCCDA;
    --lime: #BAF14D; --lime-bright: #C9F76B; --blue: #2966E5;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --mono: 'DM Mono', ui-monospace, monospace;
    --radius-lg: 14px; --radius-pill: 9999px;
    --w: {{__width__}}px; --h: {{__height__}}px;
  }

  /* ── shared classes ── */
  .sx-card { position:relative;box-sizing:border-box;width:1080px;height:1350px;background:var(--navy);color:var(--soft-white);font-family:var(--display);overflow:hidden; }
  .sx-card * { box-sizing:border-box; }
  .sx-pad { padding:88px; }
  .sx-eyebrow { font-family:var(--mono);font-weight:500;font-size:30px;letter-spacing:0.2em;text-transform:uppercase;color:var(--lime);display:inline-flex;align-items:center;gap:14px;flex-shrink:0;white-space:nowrap; }
  .sx-display { font-family:var(--display);font-weight:800;font-size:84px;line-height:0.98;letter-spacing:-0.035em;color:var(--soft-white);text-wrap:balance; }
  .sx-lead { font-family:var(--display);font-weight:500;font-size:34px;line-height:1.32;letter-spacing:-0.01em;color:var(--soft-white); }
  .sx-meta { font-family:var(--mono);font-weight:400;font-size:22px;letter-spacing:0.02em;color:var(--soft-white-2); }
  .sx-hl { color:var(--lime); }
  .sx-divider { height:3px;background:rgba(232,232,238,0.16);border:0; }
  .sx-pill { display:inline-flex;align-items:center;gap:12px;padding:14px 26px;border-radius:9999px;white-space:nowrap;font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:-0.01em; }
  .sx-pill--lime { background:var(--lime);color:var(--navy); }
  .sx-loc { display:inline-flex;align-items:center;gap:12px;font-family:var(--display);font-weight:600;font-size:30px;color:var(--soft-white);letter-spacing:-0.01em; }
  .sx-footer { display:flex;align-items:center;justify-content:space-between; }
  .sx-scrim { position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(25,26,46,0.05) 0%,rgba(25,26,46,0.08) 42%,rgba(25,26,46,0.72) 78%,rgba(25,26,46,0.97) 100%); }

  /* ── template-specific ── */
  * { margin:0; padding:0; }
  html, body { width:var(--w); height:var(--h); overflow:hidden; -webkit-font-smoothing:antialiased; }

  .rp-photo {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }

  .rp-content {
    position:relative; z-index:1;
    height:100%;
    display:flex; flex-direction:column;
  }

  .rp-header {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
  }

  .rp-bottom { margin-top:auto; }

  .rp-region {
    color:var(--lime);
    margin-bottom:20px;
  }

  .rp-name {
    font-size:100px;
    max-width:900px;
  }

  .rp-blurb {
    margin-top:24px;
    max-width:760px;
  }
  .rp-blurb:empty { display: none; }
  .rp-region:has(.rp-region-text:empty) { display: none; }

  .rp-divider { margin:40px 0 28px; }

  .rp-footer-loc { font-size:26px; }

  /* ── roam badge stamp ── */
  .rp-badge {
    position:relative;
    width:236px; height:236px;
    flex:0 0 auto;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,0.45));
  }
  .rp-badge-plate {
    position:absolute; inset:0;
    border-radius:50%;
    background:var(--navy-3);
    border:4px solid var(--lime);
  }
  .rp-badge-glyph {
    position:absolute; inset:26%;
    display:flex; align-items:center; justify-content:center;
  }
  .rp-badge-glyph img {
    width:100%; height:100%;
    object-fit:contain;
  }
  .rp-badge-arcs {
    position:absolute; inset:0;
    width:100%; height:100%;
  }
</style>
</head>
<body>
  <div class="sx-card">
    <!-- full-bleed photo -->
    <img class="rp-photo" src="{{photo}}" alt="" crossorigin="anonymous" />

    <!-- gradient scrim -->
    <div class="sx-scrim"></div>

    <!-- content overlay -->
    <div class="sx-pad rp-content">
      <!-- header: eyebrow + badge -->
      <div class="rp-header">
        <span class="sx-eyebrow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="32" height="32" style="vertical-align:-0.125em"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216ZM172.42,72.84l-64,32a8.05,8.05,0,0,0-3.58,3.58l-32,64A8,8,0,0,0,80,184a8.1,8.1,0,0,0,3.58-.84l64-32a8.05,8.05,0,0,0,3.58-3.58l32-64a8,8,0,0,0-10.74-10.74ZM138,138,97.89,158.11,118,118l40.15-20.07Z"/></svg>
          <span>Roam</span>
        </span>

        <!-- roam badge stamp -->
        <div class="rp-badge">
          <div class="rp-badge-plate"></div>
          <div class="rp-badge-glyph">
            <img src="{{badge}}" alt="" />
          </div>
          <svg class="rp-badge-arcs" viewBox="0 0 200 200">
            <defs>
              <path id="rb-top" d="M100,100 m-74,0 a74,74 0 1,1 148,0" fill="none" />
              <path id="rb-bot" d="M100,100 m-66,0 a66,66 0 1,0 132,0" fill="none" />
            </defs>
            <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(232,232,238,0.22)" stroke-width="1.5" stroke-dasharray="2 6" stroke-linecap="round" />
            <text font-family="var(--mono)" font-size="12.5" font-weight="500" letter-spacing="3.2" fill="var(--soft-white)">
              <textPath href="#rb-top" startOffset="50%" text-anchor="middle">{{badgeTop}}</textPath>
            </text>
            <text font-family="var(--mono)" font-size="11" font-weight="500" letter-spacing="2.4" fill="var(--lime)">
              <textPath href="#rb-bot" startOffset="50%" text-anchor="middle">{{badgeRegion}}</textPath>
            </text>
            <circle cx="22" cy="100" r="3" fill="var(--lime)" />
            <circle cx="178" cy="100" r="3" fill="var(--lime)" />
          </svg>
        </div>
      </div>

      <!-- bottom content -->
      <div class="rp-bottom">
        <!-- region -->
        <span class="sx-loc rp-region">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="var(--lime)" width="34" height="34" style="display:inline-block;vertical-align:middle;flex:0 0 auto"><path d="M128,64a40,40,0,1,0,40,40A40,40,0,0,0,128,64Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,128Zm0-112a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.23,144.53,209,128,222Z"/></svg>
          <span class="rp-region-text">{{region}}</span>
        </span>

        <!-- name -->
        <div class="sx-display rp-name">{{name}}</div>

        <!-- blurb -->
        <div class="sx-lead rp-blurb">{{blurb}}</div>

        <!-- divider -->
        <hr class="sx-divider rp-divider" />

        <!-- footer -->
        <div class="sx-footer">
          <span class="sx-loc rp-footer-loc">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="var(--lime)" width="32" height="32" style="display:inline-block;vertical-align:middle;flex:0 0 auto"><path d="M208.06,184H152a8,8,0,0,0-8,8v12a36,36,0,0,0,72.05,0V192A8,8,0,0,0,208.06,184Zm-8,20a20,20,0,0,1-40,0v-4h40ZM104,160h-56a8,8,0,0,0-8,8v12A36,36,0,0,0,112,180V168A8,8,0,0,0,104,160Zm-8,20a20,20,0,0,1-40,0v-4H96ZM76,16C64.36,16,53.07,26.31,44.2,45c-13.93,29.38-18.56,73,.29,96a8,8,0,0,0,6.2,2.93h50.55a8,8,0,0,0,6.2-2.93c18.85-23,14.22-66.65.29-96C98.85,26.31,87.57,16,76,16ZM97.15,128H54.78c-11.4-18.1-7.21-52.7,3.89-76.11C65.14,38.22,72.17,32,76,32s10.82,6.22,17.3,19.89C104.36,75.3,108.55,109.9,97.15,128Zm57.61,40h50.55a8,8,0,0,0,6.2-2.93c18.85-23,14.22-66.65.29-96C202.93,50.31,191.64,40,180,40s-22.89,10.31-31.77,29c-13.93,29.38-18.56,73,.29,96A8.05,8.05,0,0,0,154.76,168Zm8-92.11C169.22,62.22,176.25,56,180,56s10.82,6.22,17.29,19.89c11.1,23.41,15.29,58,3.9,76.11H158.85C147.45,133.9,151.64,99.3,162.74,75.89Z"/></svg>
            Find it in Shift
          </span>
          <svg width="150" viewBox="0 0 125 40" xmlns="http://www.w3.org/2000/svg" style="display:block"><text x="0" y="30" font-family="'Bricolage Grotesque','Arial Black',sans-serif" font-weight="800" font-size="34" letter-spacing="-1.36" fill="#FFFFFF">Shift</text><path d="M85,7 L101,20 L85,33 L85,26 L95,20 L85,14Z" fill="#BAF14D" /><path d="M104,7 L120,20 L104,33 L104,26 L114,20 L104,14Z" fill="#2966E5" /></svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
