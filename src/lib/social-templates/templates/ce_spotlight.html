<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:{{__width__}}px; height:{{__height__}}px; overflow:hidden; -webkit-font-smoothing:antialiased; }
  body {
    width:{{__width__}}px; height:{{__height__}}px;
    background:#191A2E;
    display:flex; flex-direction:column;
    font-family:'Source Sans 3',system-ui,sans-serif;
    color:rgba(255,255,255,0.92);
  }
  .hero { position:relative; height:1180px; flex:0 0 auto; }
  .scrim {
    position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg,rgba(25,26,46,0.55) 0%,rgba(25,26,46,0) 32%,rgba(25,26,46,0) 60%,rgba(25,26,46,0.96) 100%);
  }
  .hero-bar {
    position:absolute; top:72px; left:72px; right:72px;
    display:flex; align-items:center; justify-content:space-between;
    pointer-events:none;
  }
  .pill {
    font-size:26px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
    color:#BAF14D; background:rgba(25,26,46,0.55); padding:10px 20px; border-radius:9999px;
  }
  .body { flex:1; padding:0 80px 96px; display:flex; flex-direction:column; justify-content:flex-end; }
  .title {
    font-family:'Bricolage Grotesque',serif; font-weight:800;
    font-size:96px; line-height:0.98; letter-spacing:-0.035em;
    margin:0 0 26px; color:#fff;
  }
  .meta-row {
    display:flex; align-items:center; gap:20px;
    font-size:34px; color:rgba(255,255,255,0.85); margin-bottom:16px;
  }
  .cta-btn {
    background:#BAF14D; border-radius:9999px; padding:26px; text-align:center;
    font-family:'Bricolage Grotesque',serif; font-weight:800; font-size:38px;
    letter-spacing:-0.01em; color:#191A2E; margin-top:36px;
  }
</style>
</head>
<body>
  <!-- Hero image area -->
  <div class="hero">
    {{hero_html}}
    <div class="scrim"></div>
    <div class="hero-bar">
      <svg viewBox="0 0 380 30" xmlns="http://www.w3.org/2000/svg" style="height:44px;display:block">
        <text y="24" font-family="'Trebuchet MS','Lucida Grande',Verdana,sans-serif" font-size="22" letter-spacing="0.3">
          <tspan fill="#52B788" font-weight="700">Green Streets</tspan><tspan fill="#FFFFFF" font-weight="400"> Initiative</tspan>
        </text>
      </svg>
      <span class="pill">Don't miss</span>
    </div>
  </div>

  <!-- Event details -->
  <div class="body">
    {{type_tile_html}}

    <h2 class="title">{{title}}</h2>

    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="meta-row">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#BAF14D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 38px"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        {{date_long}}
      </div>
      <div class="meta-row">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#BAF14D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 38px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        {{time_range}}
      </div>
      <div class="meta-row">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#BAF14D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 38px"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        {{venue_city}}
      </div>
    </div>

    <div class="cta-btn">Tap the link in our bio →</div>
  </div>
</body>
</html>
