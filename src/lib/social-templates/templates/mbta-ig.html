<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;
    --line-color: {{line_color}};
    --line-text: {{line_text_color}};
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w); height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .template {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: calc(var(--h) * 0.04) calc(var(--w) * 0.045) calc(var(--h) * 0.035);
    position: relative; overflow: hidden;
  }

  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--line-color);
  }

  .chevron-watermark {
    position: absolute;
    bottom: calc(var(--h) * 0.03);
    right: calc(var(--w) * -0.025);
    width: calc(var(--w) * 0.28);
    opacity: 0.025;
    pointer-events: none;
  }

  .shift-lockup { display: flex; align-items: center; gap: 10px; }
  .shift-lockup .word {
    font-weight: 800;
    font-size: calc(var(--w) * 0.030);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }
  .shift-lockup svg { width: calc(var(--w) * 0.038); height: auto; }

  .alert-pill {
    margin-top: calc(var(--h) * 0.022);
    display: inline-flex; align-items: center; gap: 9px;
    background: color-mix(in srgb, var(--line-color) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--line-color) 35%, transparent);
    border-radius: 10px;
    padding: calc(var(--h) * 0.014) calc(var(--w) * 0.022);
    align-self: flex-start;
  }
  .alert-pill .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--line-color);
  }
  .alert-pill .label {
    font-size: calc(var(--w) * 0.022);
    font-weight: 700;
    color: var(--line-text);
  }
  .alert-detail {
    font-size: calc(var(--w) * 0.020);
    color: var(--body);
    line-height: 1.45;
    margin-top: calc(var(--h) * 0.014);
  }

  .divider {
    width: calc(var(--w) * 0.05);
    height: 3px;
    border-radius: 2px;
    background: var(--card);
    margin: calc(var(--h) * 0.018) 0;
  }

  .alts-label {
    font-size: calc(var(--w) * 0.014);
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--secondary);
    text-transform: uppercase;
    margin-bottom: calc(var(--h) * 0.012);
  }

  /* Alternative cards (rendered from {{alternatives_html}}) */
  .alts-list {
    display: flex; flex-direction: column;
    gap: calc(var(--h) * 0.010);
  }
  .alt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: calc(var(--h) * 0.014) calc(var(--w) * 0.018);
    display: flex; align-items: flex-start; gap: calc(var(--w) * 0.014);
  }
  .alt-card--highlight {
    background: color-mix(in srgb, var(--green) 8%, var(--card));
    border-color: color-mix(in srgb, var(--green) 25%, var(--border));
  }
  .alt-icon {
    margin-top: 3px;
    font-size: calc(var(--w) * 0.028);
    line-height: 1;
    flex-shrink: 0;
  }
  .alt-content { flex: 1; min-width: 0; }
  .alt-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }
  .alt-mode {
    font-size: calc(var(--w) * 0.020);
    font-weight: 700;
    color: var(--white);
  }
  .alt-time {
    font-size: calc(var(--w) * 0.015);
    color: var(--secondary);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .alt-detail {
    font-size: calc(var(--w) * 0.016);
    color: var(--body);
    margin-top: 4px;
  }

  /* Conditions chip + source line in footer */
  .footer {
    margin-top: auto;
    padding-top: calc(var(--h) * 0.018);
    display: flex; align-items: center; gap: calc(var(--w) * 0.014);
  }
  .conditions-chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--card);
    border-radius: 999px;
    padding: calc(var(--h) * 0.010) calc(var(--w) * 0.018);
    border: 1px solid var(--border);
  }
  .conditions-icon {
    font-size: calc(var(--w) * 0.020);
    line-height: 1;
    color: #FBBF24;
  }
  .conditions-text {
    font-size: calc(var(--w) * 0.014);
    color: var(--body);
    font-family: 'DM Mono', monospace;
  }
  .source-line {
    font-size: calc(var(--w) * 0.012);
    font-family: 'DM Mono', monospace;
    color: var(--attribution);
  }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>
    <svg class="chevron-watermark" viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
      <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
    </svg>

    <div class="shift-lockup">
      <span class="word">Shift</span>
      <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
        <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
      </svg>
    </div>

    <div class="alert-pill">
      <div class="dot"></div>
      <span class="label">{{line_name}} · {{alert_type}}</span>
    </div>

    <div class="alert-detail">{{alert_detail}}</div>

    <div class="divider"></div>

    <div class="alts-label">Your alternatives</div>
    <div class="alts-list">
      {{alternatives_html}}
    </div>

    <div class="footer">
      <div class="conditions-chip">
        <span class="conditions-icon">{{current_condition_icon}}</span>
        <span class="conditions-text">{{current_temp}} · {{current_condition}}</span>
      </div>
      <span class="source-line">MBTA Realtime · NWS</span>
    </div>
  </div>
</body>
</html>
