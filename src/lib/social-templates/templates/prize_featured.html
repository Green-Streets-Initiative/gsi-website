<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #191A2E; --navy-2: #20223A; --navy-3: #15162a;
    --soft-white: #E8E8EE; --soft-white-2: #CBCCDA;
    --lime: #BAF14D; --lime-bright: #C9F76B;
    --blue: #2966E5;
    --forest: #2D6A4F; --forest-lt: #52B788; --forest-tint: #D8E8DE;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --mono: 'DM Mono', ui-monospace, monospace;
    --radius-sm: 8px; --radius-md: 10px; --radius-lg: 14px; --radius-xl: 20px; --radius-pill: 9999px;
    --w: {{__width__}}px; --h: {{__height__}}px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--w); height: var(--h); overflow: hidden;
    background: var(--navy);
    font-family: var(--display);
    -webkit-font-smoothing: antialiased; color: var(--soft-white);
  }

  /* ---- shared sx classes ---- */
  .sx-card { position:relative;box-sizing:border-box;width:1080px;height:1350px;background:var(--navy);color:var(--soft-white);font-family:var(--display);overflow:hidden; }
  .sx-card * { box-sizing:border-box; }
  .sx-pad { padding:88px; }
  .sx-eyebrow { font-family:var(--mono);font-weight:500;font-size:30px;letter-spacing:0.2em;text-transform:uppercase;color:var(--lime);display:inline-flex;align-items:center;gap:14px;flex-shrink:0;white-space:nowrap; }
  .sx-stat { font-family:var(--display);font-weight:800;font-size:380px;line-height:0.82;letter-spacing:-0.045em;color:var(--lime); }
  .sx-stat-sm { font-family:var(--display);font-weight:800;font-size:240px;line-height:0.82;letter-spacing:-0.04em;color:var(--lime); }
  .sx-display { font-family:var(--display);font-weight:800;font-size:84px;line-height:0.98;letter-spacing:-0.035em;color:var(--soft-white);text-wrap:balance; }
  .sx-headline { font-family:var(--display);font-weight:700;font-size:60px;line-height:1.02;letter-spacing:-0.03em;color:var(--soft-white); }
  .sx-title { font-family:var(--display);font-weight:700;font-size:44px;line-height:1.05;letter-spacing:-0.025em;color:var(--soft-white); }
  .sx-lead { font-family:var(--display);font-weight:500;font-size:34px;line-height:1.32;letter-spacing:-0.01em;color:var(--soft-white); }
  .sx-meta { font-family:var(--mono);font-weight:400;font-size:22px;letter-spacing:0.02em;color:var(--soft-white-2); }
  .sx-hl { color:var(--lime); }
  .sx-divider { height:3px;background:rgba(232,232,238,0.16);border:0; }
  .sx-pill { display:inline-flex;align-items:center;gap:12px;padding:14px 26px;border-radius:9999px;white-space:nowrap;font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:-0.01em; }
  .sx-pill--lime { background:var(--lime);color:var(--navy); }
  .sx-pill--ghost { background:transparent;color:var(--soft-white);box-shadow:inset 0 0 0 2px rgba(232,232,238,0.28); }
  .sx-loc { display:inline-flex;align-items:center;gap:12px;font-family:var(--display);font-weight:600;font-size:30px;color:var(--soft-white);letter-spacing:-0.01em; }
  .sx-footer { display:flex;align-items:center;justify-content:space-between; }
  .sx-glow { position:absolute;width:820px;height:820px;border-radius:50%;background:radial-gradient(circle,rgba(186,241,77,0.20) 0%,rgba(186,241,77,0.06) 45%,transparent 68%);pointer-events:none; }
  .sx-tile { background:var(--navy-2);border:1px solid rgba(232,232,238,0.10);border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:center; }
  .sx-qty { font-family:var(--mono);font-weight:500;font-size:22px;color:var(--navy);background:var(--lime);border-radius:9999px;padding:4px 16px;letter-spacing:0.02em;white-space:nowrap; }

  /* ---- template-specific ---- */
  .card-inner {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }
  .display-headline {
    font-size: 76px;
    margin-top: 28px;
    max-width: 760px;
  }
  .prize-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(3, 1fr);
    gap: 24px;
    margin-top: 44px;
    flex: 1 1 auto;
    min-height: 0;
  }
  .prize-footer-wrap {
    margin-top: 44px;
  }
  .footer-divider {
    margin-bottom: 24px;
  }
  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .footer-mechanic {
    font-size: 26px;
    white-space: nowrap;
  }
  .footer-dates {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="sx-card sx-pad">
    <div class="card-inner">
      <!-- eyebrow -->
      <span class="sx-eyebrow">
        <svg width="32" height="32" viewBox="0 0 256 256" fill="var(--lime)" style="display:inline-block;vertical-align:middle;flex:0 0 auto">
          <path d="M216,72H180.92c.39-.33.79-.65,1.17-1A29.53,29.53,0,0,0,192,49.57,32.62,32.62,0,0,0,158.44,16,29.53,29.53,0,0,0,137,25.91a54.94,54.94,0,0,0-9,14.48,54.94,54.94,0,0,0-9-14.48A29.53,29.53,0,0,0,97.56,16,32.62,32.62,0,0,0,64,49.57,29.53,29.53,0,0,0,73.91,71c.38.33.78.65,1.17,1H40A16,16,0,0,0,24,88v32a16,16,0,0,0,16,16v64a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V136a16,16,0,0,0,16-16V88A16,16,0,0,0,216,72ZM149,36.51a13.69,13.69,0,0,1,10-4.5h.49A16.62,16.62,0,0,1,176,49.08a13.69,13.69,0,0,1-4.5,10c-9.49,8.4-25.78,11.92-35.63,13.12C137.08,62.29,140.6,45.91,149,36.51Zm-68.49,0c8.4-9.49,25.78-11.92,35.63-13.12C115,33.29,111.4,49.68,103,59.08a13.69,13.69,0,0,1-10,4.5h-.49A16.62,16.62,0,0,1,76,46.92,13.69,13.69,0,0,1,80.5,36.92ZM40,88H120v32H40Zm16,48h64v64H56Zm144,64H136V136h64Zm16-80H136V88h80Z"/>
        </svg>
        <span>Shift Your Summer &middot; Featured prizes</span>
      </span>

      <!-- headline -->
      <div class="sx-display display-headline">{{headline}}</div>

      <!-- 2×3 product grid (pre-rendered tiles) -->
      <div class="prize-grid">
        {{items_html}}
      </div>

      <!-- prize footer -->
      <div class="prize-footer-wrap">
        <hr class="sx-divider footer-divider" />
        <div class="sx-footer">
          <div class="footer-left">
            <span class="sx-loc footer-mechanic">
              <svg width="30" height="30" viewBox="0 0 256 256" fill="var(--lime)" style="display:inline-block;vertical-align:middle;flex:0 0 auto">
                <path d="M227.19,104.48A16,16,0,0,0,240,88.81V64a16,16,0,0,0-16-16H32A16,16,0,0,0,16,64V88.81a16,16,0,0,0,12.81,15.67,20,20,0,0,1,0,39A16,16,0,0,0,16,159.19V192a16,16,0,0,0,16,16H224a16,16,0,0,0,16-16V159.19a16,16,0,0,0-12.81-15.67,20,20,0,0,1,0-39ZM32,167.2a36,36,0,0,0,0-70.4V64H96V192H32ZM224,192H112V64H224V96.81a36,36,0,0,0,0,70.38Z"/>
              </svg>
              {{mechanic}}
            </span>
            <span class="sx-meta footer-dates">
              <svg width="26" height="26" viewBox="0 0 256 256" fill="var(--soft-white-2)" style="display:inline-block;vertical-align:middle;flex:0 0 auto">
                <path d="M208,32H184V24a8,8,0,0,0-16,0v8H88V24a8,8,0,0,0-16,0v8H48A16,16,0,0,0,32,48V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V48A16,16,0,0,0,208,32Zm0,176H48V48H72v8a8,8,0,0,0,16,0V48h80v8a8,8,0,0,0,16,0V48h24ZM48,80H208v128H48Z"/>
              </svg>
              {{dates}}
            </span>
          </div>
          <svg width="150" viewBox="0 0 125 40" xmlns="http://www.w3.org/2000/svg" style="display:block">
            <text x="0" y="30" font-family="'Bricolage Grotesque','Arial Black',sans-serif" font-weight="800" font-size="34" letter-spacing="-1.36" fill="#FFFFFF">Shift</text>
            <path d="M85,7 L101,20 L85,33 L85,26 L95,20 L85,14Z" fill="#BAF14D" />
            <path d="M104,7 L120,20 L104,33 L104,26 L114,20 L104,14Z" fill="#2966E5" />
          </svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
