<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── tokens ── */
  :root {
    --navy: #191A2E; --navy-2: #20223A; --navy-3: #15162a;
    --soft-white: #E8E8EE; --soft-white-2: #CBCCDA;
    --lime: #BAF14D; --lime-bright: #C9F76B; --blue: #2966E5;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --mono: 'DM Mono', ui-monospace, monospace;
    --radius-lg: 14px; --radius-pill: 9999px;
    --w: {{__width__}}px; --h: {{__height__}}px;
  }

  /* ── shared classes ── */
  .sx-card { position:relative;box-sizing:border-box;width:1080px;height:1350px;background:var(--navy);color:var(--soft-white);font-family:var(--display);overflow:hidden; }
  .sx-card * { box-sizing:border-box; }
  .sx-pad { padding:88px; }
  .sx-eyebrow { font-family:var(--mono);font-weight:500;font-size:30px;letter-spacing:0.2em;text-transform:uppercase;color:var(--lime);display:inline-flex;align-items:center;gap:14px;flex-shrink:0;white-space:nowrap; }
  .sx-display { font-family:var(--display);font-weight:800;font-size:84px;line-height:0.98;letter-spacing:-0.035em;color:var(--soft-white);text-wrap:balance; }
  .sx-lead { font-family:var(--display);font-weight:500;font-size:34px;line-height:1.32;letter-spacing:-0.01em;color:var(--soft-white); }
  .sx-meta { font-family:var(--mono);font-weight:400;font-size:22px;letter-spacing:0.02em;color:var(--soft-white-2); }
  .sx-hl { color:var(--lime); }
  .sx-divider { height:3px;background:rgba(232,232,238,0.16);border:0; }
  .sx-pill { display:inline-flex;align-items:center;gap:12px;padding:14px 26px;border-radius:9999px;white-space:nowrap;font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:-0.01em; }
  .sx-pill--lime { background:var(--lime);color:var(--navy); }
  .sx-loc { display:inline-flex;align-items:center;gap:12px;font-family:var(--display);font-weight:600;font-size:30px;color:var(--soft-white);letter-spacing:-0.01em; }
  .sx-footer { display:flex;align-items:center;justify-content:space-between; }
  .sx-scrim { position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(25,26,46,0.05) 0%,rgba(25,26,46,0.08) 42%,rgba(25,26,46,0.72) 78%,rgba(25,26,46,0.97) 100%); }

  /* ── template-specific ── */
  * { margin:0; padding:0; }
  html, body { width:var(--w); height:var(--h); overflow:hidden; -webkit-font-smoothing:antialiased; }

  .rc-layout {
    display:flex;
    flex-direction:column;
  }

  .rc-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .rc-count-pill {
    font-size:24px;
    padding:12px 24px;
  }

  .rc-title {
    font-size:84px;
    margin-top:28px;
    max-width:860px;
  }

  .rc-lead {
    margin-top:20px;
    max-width:820px;
    color:var(--soft-white-2);
  }

  .rc-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:18px;
    margin-top:40px;
    flex:1 1 auto;
    min-height:0;
  }

  /* photo tile (rendered server-side into items_html) */
  .rc-tile {
    position:relative;
    border-radius:16px;
    overflow:hidden;
    min-height:0;
  }
  .rc-tile img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }
  .rc-tile-scrim {
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(21,22,42,0) 38%, rgba(21,22,42,0.92) 100%);
  }
  .rc-tile-label {
    position:absolute;
    left:18px; right:18px; bottom:16px;
    font-family:var(--display);
    font-weight:700;
    font-size:26px;
    line-height:1.04;
    letter-spacing:-0.02em;
    color:var(--soft-white);
  }

  /* "+N more" tile */
  .rc-tile-more {
    position:relative;
    border-radius:16px;
    overflow:hidden;
    min-height:0;
    background:var(--navy-2);
    border:2px dashed rgba(186,241,77,0.4);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .rc-tile-more-count {
    font-family:var(--display);
    font-weight:800;
    font-size:64px;
    line-height:0.9;
    letter-spacing:-0.04em;
    color:var(--lime);
  }
  .rc-tile-more-label {
    margin-top:8px;
  }

  .rc-divider { margin:36px 0 24px; }

  .rc-footer-left {
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .rc-footer-loc { font-size:26px; }
  .rc-footer-curators {
    display:inline-flex;
    align-items:center;
    gap:10px;
    white-space:nowrap;
  }
</style>
</head>
<body>
  <div class="sx-card sx-pad rc-layout">
    <!-- header: eyebrow + count pill -->
    <div class="rc-header">
      <span class="sx-eyebrow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="32" height="32" style="vertical-align:-0.125em"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm51.58,57.79-32,64a4.08,4.08,0,0,1-1.79,1.79l-64,32a4,4,0,0,1-5.37-5.37l32-64a4.08,4.08,0,0,1,1.79-1.79l64-32A4,4,0,0,1,179.58,81.79Z"/></svg>
        <span>Roam collection</span>
      </span>
      <span class="sx-pill sx-pill--lime rc-count-pill">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="var(--navy)" width="28" height="28" style="display:inline-block;vertical-align:middle;flex:0 0 auto"><path d="M216,96A88,88,0,1,0,72,163.83V240a8,8,0,0,0,11.58,7.16L128,225l44.43,22.21A8.07,8.07,0,0,0,176,248a8,8,0,0,0,8-8V163.83A87.85,87.85,0,0,0,216,96ZM56,96a72,72,0,1,1,72,72A72.08,72.08,0,0,1,56,96Z"/></svg>
        {{count}}
      </span>
    </div>

    <!-- display title -->
    <div class="sx-display rc-title">{{title}}</div>

    <!-- lead text -->
    <div class="sx-lead rc-lead">
      <span class="sx-hl" style="font-weight:700">{{collection}}</span> — {{blurb}}
    </div>

    <!-- photo grid (5 tiles + "+N more" tile, pre-rendered) -->
    <div class="rc-grid">
      {{items_html}}
    </div>

    <!-- divider -->
    <hr class="sx-divider rc-divider" />

    <!-- footer -->
    <div class="sx-footer">
      <div class="rc-footer-left">
        <span class="sx-loc rc-footer-loc">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="var(--lime)" width="32" height="32" style="display:inline-block;vertical-align:middle;flex:0 0 auto"><path d="M228,200a28,28,0,0,1-54.83,8H72a48,48,0,0,1,0-96h96a24,24,0,0,0,0-48H72a8,8,0,0,1,0-16h96a40,40,0,0,1,0,80H72a32,32,0,0,0,0,64H173.17A28,28,0,0,1,228,200Z"/></svg>
          Start collecting in Shift
        </span>
        <span class="sx-meta rc-footer-curators">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="var(--soft-white-2)" width="24" height="24" style="display:inline-block;vertical-align:middle;flex:0 0 auto"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm51.58,57.79-32,64a4.08,4.08,0,0,1-1.79,1.79l-64,32a4,4,0,0,1-5.37-5.37l32-64a4.08,4.08,0,0,1,1.79-1.79l64-32A4,4,0,0,1,179.58,81.79Z"/></svg>
          {{curators}}
        </span>
      </div>
      <svg width="150" viewBox="0 0 125 40" xmlns="http://www.w3.org/2000/svg" style="display:block"><text x="0" y="30" font-family="'Bricolage Grotesque','Arial Black',sans-serif" font-weight="800" font-size="34" letter-spacing="-1.36" fill="#FFFFFF">Shift</text><path d="M85,7 L101,20 L85,33 L85,26 L95,20 L85,14Z" fill="#BAF14D" /><path d="M104,7 L120,20 L104,33 L104,26 L114,20 L104,14Z" fill="#2966E5" /></svg>
    </div>
  </div>
</body>
</html>
