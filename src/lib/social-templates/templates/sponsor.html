<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --leaf-white: #F4F8EE;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;

    /* Tier color injected by caller (e.g. blue for Community,
       green for Champion / Presenting). */
    --tier-color: {{tier_color}};
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .template {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: calc(var(--h) * 0.06) calc(var(--w) * 0.05);
    position: relative; overflow: hidden;
  }

  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--blue));
  }

  /* Logo area — for sponsor template, ALL platforms show the
     standard Shift lockup at top. The GSI wordmark goes at the
     footer (always — only template where this is true). */
  .logo-area { display: flex; flex-direction: column; gap: 4px; }
  .shift-lockup { display: flex; align-items: center; gap: 8px; }
  .shift-lockup .word {
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    font-weight: 800;
    font-size: calc(var(--w) * 0.022);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }

  /* Campaign badge */
  .campaign {
    margin-top: calc(var(--h) * 0.03);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: color-mix(in srgb, var(--green) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--green) 22%, transparent);
    border-radius: 8px;
    padding: 9px 14px;
    align-self: flex-start;
  }
  .campaign-icon {
    font-size: calc(var(--w) * 0.018);
    line-height: 1;
    color: var(--green);
  }
  .campaign-name {
    font-size: calc(var(--w) * 0.013);
    font-weight: 700;
    color: var(--green);
  }

  /* Gratitude headline */
  .thanks-line {
    font-size: calc(var(--w) * 0.013);
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--secondary);
    margin-top: calc(var(--h) * 0.025);
    text-transform: uppercase;
  }
  .tier-label {
    font-size: calc(var(--w) * 0.015);
    font-weight: 700;
    color: var(--tier-color);
    margin-top: 4px;
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .tier-label .tier-icon {
    font-size: calc(var(--w) * 0.018);
    line-height: 1;
  }

  /* Sponsor logo container — large, light-bg, prominent */
  .sponsor-logo-container {
    margin-top: 18px;
    width: 100%;
    height: calc(var(--h) * 0.115);
    background: var(--leaf-white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 18px;
  }
  .sponsor-logo-img {
    width: calc(var(--h) * 0.075);
    height: calc(var(--h) * 0.075);
    object-fit: contain;
    flex-shrink: 0;
  }
  .sponsor-name {
    font-size: calc(var(--w) * 0.02);
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.02em;
  }

  /* Impact text */
  .impact {
    margin-top: auto;
  }
  .impact-text {
    font-size: calc(var(--w) * 0.014);
    color: var(--body);
    line-height: 1.55;
  }

  .cta {
    display: none;
    margin-top: 14px;
    background: var(--green);
    color: var(--navy);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: calc(var(--w) * 0.012);
    font-weight: 700;
    align-self: flex-start;
  }
  [data-platform="facebook"] .cta:not(:empty) { display: inline-flex; }
  [data-platform="linkedin"] .cta:not(:empty) { display: inline-flex; }

  /* GSI wordmark footer — ALWAYS visible for sponsor template */
  .gsi-footer {
    margin-top: calc(var(--h) * 0.025);
    padding-top: 14px;
  }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.013);
    letter-spacing: 0.5px;
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>

    <div class="logo-area">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" width="28" height="22" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
    </div>

    <div class="campaign">
      <span class="campaign-icon">{{campaign_icon}}</span>
      <span class="campaign-name">{{campaign_name}}</span>
    </div>

    <div class="thanks-line">Thank you to our</div>
    <div class="tier-label"><span class="tier-icon">{{tier_icon}}</span>{{tier_label}}</div>

    <div class="sponsor-logo-container">
      <img class="sponsor-logo-img" src="{{sponsor_logo}}" alt="" crossorigin="anonymous" />
      <div class="sponsor-name">{{sponsor_name}}</div>
    </div>

    <div class="impact">
      <div class="impact-text">{{impact_text}}</div>
      <div class="cta">{{cta_text}}</div>
    </div>

    <div class="gsi-footer">
      <span class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </span>
    </div>
  </div>
</body>
</html>
