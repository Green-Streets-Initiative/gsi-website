<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --leaf-white: #F4F8EE;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;

    --tier-color: {{tier_color}};
    /* Drives the campaign badge tint, the badge text, and the
       campaign icon. Defaults to brand green (caller passes a
       seasonal accent: warm gold for summer, autumn orange for fall). */
    --campaign-color: {{campaign_color}};
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  /* Tight vertical layout — uses gap, not auto-margins, so content
     stays close together regardless of canvas height. */
  .template {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: calc(var(--h) * 0.06) calc(var(--w) * 0.05);
    position: relative; overflow: hidden;
  }

  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--green), var(--blue));
  }

  /* Header row — Shift lockup + campaign badge side by side */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: calc(var(--h) * 0.04);
  }

  .shift-lockup { display: flex; align-items: center; gap: 10px; }
  .shift-lockup .word {
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    font-weight: 800;
    font-size: calc(var(--w) * 0.032);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }
  .shift-lockup svg { width: calc(var(--w) * 0.04); height: auto; }

  .campaign {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: color-mix(in srgb, var(--campaign-color) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--campaign-color) 30%, transparent);
    border-radius: 999px;
    padding: calc(var(--h) * 0.018) calc(var(--w) * 0.022);
  }
  .campaign-icon {
    font-size: calc(var(--w) * 0.028);
    line-height: 1;
    color: var(--campaign-color);
  }
  .campaign-name {
    font-size: calc(var(--w) * 0.022);
    font-weight: 700;
    color: var(--campaign-color);
  }

  /* Hero block — the gratitude headline and the sponsor logo are the
     point of the card. They occupy the visual center via flex:1 +
     center-aligned content. */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: calc(var(--h) * 0.022);
  }

  .thanks-line {
    font-size: calc(var(--w) * 0.022);
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--secondary);
    text-transform: uppercase;
  }
  .tier-label {
    font-size: calc(var(--w) * 0.034);
    font-weight: 800;
    color: var(--tier-color);
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    line-height: 1;
  }
  .tier-label .tier-icon {
    font-size: calc(var(--w) * 0.038);
    line-height: 1;
  }

  /* Sponsor logo container — the visual hero, centered, prominent */
  .sponsor-logo-container {
    width: 78%;
    background: var(--leaf-white);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: calc(var(--w) * 0.022);
    padding: calc(var(--h) * 0.035) calc(var(--w) * 0.03);
  }
  .sponsor-logo-img {
    width: calc(var(--h) * 0.11);
    height: calc(var(--h) * 0.11);
    object-fit: contain;
    flex-shrink: 0;
  }
  .sponsor-name {
    font-size: calc(var(--w) * 0.034);
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.02em;
  }

  /* Impact text — directly under hero, no auto-margin trickery */
  .impact-text {
    font-size: calc(var(--w) * 0.022);
    color: var(--body);
    line-height: 1.5;
    text-align: center;
    margin-top: calc(var(--h) * 0.025);
    max-width: 92%;
    align-self: center;
  }

  .cta {
    display: none;
    margin-top: calc(var(--h) * 0.022);
    background: var(--green);
    color: var(--navy);
    border-radius: 8px;
    padding: calc(var(--h) * 0.018) calc(var(--w) * 0.022);
    font-size: calc(var(--w) * 0.018);
    font-weight: 700;
    align-self: center;
  }
  [data-platform="facebook"] .cta:not(:empty) { display: inline-flex; }
  [data-platform="linkedin"] .cta:not(:empty) { display: inline-flex; }

  /* GSI wordmark footer — ALWAYS visible (only template that does so) */
  .gsi-footer {
    margin-top: calc(var(--h) * 0.04);
    text-align: center;
  }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.018);
    letter-spacing: 0.5px;
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>

    <div class="header">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
      <div class="campaign">
        <span class="campaign-icon">{{campaign_icon}}</span>
        <span class="campaign-name">{{campaign_name}}</span>
      </div>
    </div>

    <div class="hero">
      <div>
        <div class="thanks-line">Thank you to our</div>
        <div class="tier-label" style="margin-top:6px"><span class="tier-icon">{{tier_icon}}</span>{{tier_label}}</div>
      </div>

      <div class="sponsor-logo-container">
        <img class="sponsor-logo-img" src="{{sponsor_logo}}" alt="" crossorigin="anonymous" />
        <div class="sponsor-name">{{sponsor_name}}</div>
      </div>

      <div class="impact-text">{{impact_text}}</div>
      <div class="cta">{{cta_text}}</div>
    </div>

    <div class="gsi-footer">
      <span class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </span>
    </div>
  </div>
</body>
</html>
