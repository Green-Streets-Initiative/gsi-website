<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #191A2E;
    --navy-2: #20223A;
    --navy-3: #15162a;
    --soft-white: #E8E8EE;
    --soft-white-2: #CBCCDA;
    --lime: #BAF14D;
    --lime-bright: #C9F76B;
    --blue: #2966E5;
    --forest: #2D6A4F;
    --forest-lt: #52B788;
    --forest-tint: #D8E8DE;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --mono: 'DM Mono', ui-monospace, monospace;
    --w: {{__width__}}px;
    --h: {{__height__}}px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w);
    height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: var(--display);
    -webkit-font-smoothing: antialiased;
    color: var(--soft-white);
  }

  .sx-card {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  /* Full-bleed photo background */
  .photo-layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .photobg-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
    background: linear-gradient(180deg,
       rgba(21,22,42,0.58) 0%,
       rgba(21,22,42,0.58) 42%,
       rgba(21,22,42,0.82) 78%,
       rgba(21,22,42,0.96) 100%);
  }

  /* Photo toggle via data attribute */
  [data-photo="false"] .photo-layer,
  [data-photo="false"] .photobg-layer { display: none; }

  /* Org lockup toggle */
  [data-org="gsi"] .lockup-shift { display: none; }
  [data-org="shift"] .lockup-gsi { display: none; }

  .sx-pad {
    position: relative;
    z-index: 2;
    padding: 88px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Eyebrow */
  .sx-eyebrow {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--lime);
    display: inline-flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .sx-eyebrow svg {
    flex-shrink: 0;
  }

  /* Display text — editorial statement with inline highlight */
  .sx-display {
    font-family: var(--display);
    font-weight: 800;
    font-size: 92px;
    line-height: 0.98;
    letter-spacing: -0.035em;
    color: var(--soft-white);
    text-wrap: balance;
    margin-top: 56px;
    max-width: 920px;
    flex: 0 0 auto;
  }
  .sx-hl {
    color: var(--lime);
  }

  /* Bottom section — pushed to bottom via margin-top auto */
  .sx-bottom {
    margin-top: auto;
  }

  /* Reframe block — forest-tint warm CTA */
  .sx-reframe {
    background: var(--forest-tint);
    color: var(--navy);
    border-radius: 20px;
    padding: 40px 48px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .sx-reframe svg {
    flex: 0 0 auto;
    color: var(--forest);
  }
  .sx-reframe-text {
    font-family: var(--display);
    font-weight: 700;
    font-size: 44px;
    letter-spacing: -0.025em;
    line-height: 1.05;
  }
  /* Hide reframe block entirely when text is empty */
  .sx-reframe:has(.sx-reframe-text:empty) { display: none; }

  /* Hide empty spans so flex gap doesn't create phantom space */
  .sx-meta span:empty { display: none; }

  /* Divider */
  .sx-divider {
    height: 3px;
    background: rgba(232,232,238,0.16);
    border: 0;
    margin-bottom: 28px;
  }

  /* Footer */
  .sx-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sx-meta {
    font-family: var(--mono);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--soft-white-2);
  }
</style>
</head>
<body>
  <div class="sx-card" data-photo="{{photo}}" data-org="{{org}}">
    <img class="photo-layer" src="{{photoSrc}}" alt="" crossorigin="anonymous" />
    <div class="photobg-layer"></div>

    <div class="sx-pad">
      <!-- Eyebrow -->
      <div class="sx-eyebrow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="32" height="32" style="vertical-align:-0.125em"><path d="M176,232a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,232Zm40-128a87.55,87.55,0,0,1-33.64,69.21A16.24,16.24,0,0,0,176,186v6a16,16,0,0,1-16,16H96a16,16,0,0,1-16-16v-6a16,16,0,0,0-6.23-12.66A87.59,87.59,0,0,1,40,104.49C39.74,56.83,78.26,17.14,125.88,16A88,88,0,0,1,216,104Zm-16,0a72,72,0,0,0-73.74-72c-39,.92-70.47,33.39-70.26,72.39a71.65,71.65,0,0,0,27.64,56.3A32,32,0,0,1,96,186v6h64v-6a32.15,32.15,0,0,1,12.47-25.35A71.65,71.65,0,0,0,200,104Zm-16.11-9.34a57.6,57.6,0,0,0-46.56-46.55,8,8,0,0,0-2.66,15.78c16.57,2.79,30.63,16.85,33.44,33.45A8,8,0,0,0,176,104a9,9,0,0,0,1.35-.11A8,8,0,0,0,183.89,94.66Z"/></svg>
        {{eyebrow}}
      </div>

      <!-- Display text with inline highlight -->
      <div class="sx-display">{{pre}} <span class="sx-hl">{{statHl}}</span> {{post}}</div>

      <!-- Bottom: reframe + divider + footer -->
      <div class="sx-bottom">
        <div class="sx-reframe">
          <!-- sneaker-move icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="64" height="64"><path d="M231.16,166.63l-28.63-14.31A47.74,47.74,0,0,1,176,109.39V80a8,8,0,0,0-8-8,48.05,48.05,0,0,1-48-48,8,8,0,0,0-12.83-6.37L30.13,76l-.2.16a16,16,0,0,0-1.24,23.75L142.4,213.66a8,8,0,0,0,5.66,2.34H224a16,16,0,0,0,16-16V180.94A15.92,15.92,0,0,0,231.16,166.63ZM224,200H151.37L40,88.63l12.87-9.76,38.79,38.79A8,8,0,0,0,103,106.34L65.74,69.11l40-30.31A64.15,64.15,0,0,0,160,87.5v21.89a63.65,63.65,0,0,0,35.38,57.24L224,180.94ZM70.8,184H32a8,8,0,0,1,0-16H70.8a8,8,0,1,1,0,16Zm40,24a8,8,0,0,1-8,8H48a8,8,0,0,1,0-16h54.8A8,8,0,0,1,110.8,208Z"/></svg>
          <span class="sx-reframe-text">{{reframe}}</span>
        </div>
        <hr class="sx-divider" />
        <div class="sx-footer">
          <!-- GSI lockup -->
          <span class="lockup-gsi">
            <svg width="330" viewBox="0 0 380 30" xmlns="http://www.w3.org/2000/svg" style="display:block">
              <text y="24" font-family="'Trebuchet MS','Lucida Grande',Verdana,sans-serif" font-size="22" letter-spacing="0.3">
                <tspan fill="#52B788" font-weight="700">Green Streets</tspan>
                <tspan fill="#FFFFFF" font-weight="400"> Initiative</tspan>
              </text>
            </svg>
          </span>
          <!-- Shift lockup -->
          <span class="lockup-shift">
            <svg width="150" viewBox="0 0 125 40" xmlns="http://www.w3.org/2000/svg" style="display:block">
              <text x="0" y="30" font-family="'Bricolage Grotesque','Arial Black',sans-serif" font-weight="800" font-size="34" letter-spacing="-1.36" fill="#FFFFFF">Shift</text>
              <path d="M85,7 L101,20 L85,33 L85,26 L95,20 L85,14Z" fill="#BAF14D" />
              <path d="M104,7 L120,20 L104,33 L104,26 L114,20 L104,14Z" fill="#2966E5" />
            </svg>
          </span>
          <span class="sx-meta" style="display:flex;flex-direction:column;gap:16px;text-align:right">
            <span>{{source}}</span>
            <span>{{photoAttribution}}</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
