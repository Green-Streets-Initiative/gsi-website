<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;
    --line-color: {{line_color}};
    --line-text: {{line_text_color}};
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w); height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  /* Compact horizontal split — left column (alert pill + detail) +
     right column (suggestion: bike icon + headline + body) */
  .template {
    width: 100%; height: 100%;
    display: flex;
    padding: calc(var(--h) * 0.07) calc(var(--w) * 0.04);
    position: relative; overflow: hidden;
    gap: calc(var(--w) * 0.03);
  }

  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--line-color);
  }

  /* Left column */
  .left {
    display: flex; flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
    max-width: calc(var(--w) * 0.45);
  }

  .shift-lockup { display: flex; align-items: center; gap: 9px; }
  .shift-lockup .word {
    font-weight: 800;
    font-size: calc(var(--w) * 0.028);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }
  .shift-lockup svg { width: calc(var(--w) * 0.035); height: auto; }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.016);
    letter-spacing: 0.5px;
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
  .gsi-lead { display: none; flex-direction: column; gap: 5px; }
  .gsi-lead .gsi-wordmark { font-size: calc(var(--w) * 0.018); }
  .gsi-lead .shift-secondary { display: flex; align-items: center; gap: 6px; opacity: 0.75; }
  .gsi-lead .shift-secondary svg { width: calc(var(--w) * 0.022); height: auto; }
  .gsi-lead .shift-secondary .word {
    font-size: calc(var(--w) * 0.016);
    color: var(--body);
    font-weight: 700;
  }

  .alert-pill {
    display: inline-flex; align-items: center; gap: 9px;
    background: color-mix(in srgb, var(--line-color) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--line-color) 35%, transparent);
    border-radius: 8px;
    padding: calc(var(--h) * 0.014) calc(var(--w) * 0.018);
    align-self: flex-start;
  }
  .alert-pill .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--line-color);
  }
  .alert-pill .label {
    font-size: calc(var(--w) * 0.020);
    font-weight: 700;
    color: var(--line-text);
  }
  .alert-detail {
    font-size: calc(var(--w) * 0.020);
    color: var(--body);
    line-height: 1.45;
    margin-top: calc(var(--h) * 0.018);
  }

  /* Right column */
  .right {
    margin-left: auto;
    display: flex; flex-direction: column;
    justify-content: center;
    text-align: right;
    max-width: calc(var(--w) * 0.45);
  }
  .suggestion-row {
    display: flex; align-items: center; gap: 12px;
    justify-content: flex-end;
  }
  .alt-mode-icon {
    font-size: calc(var(--w) * 0.034);
    line-height: 1;
    color: var(--green);
  }
  .suggestion-headline {
    font-size: calc(var(--w) * 0.028);
    font-weight: 800;
    color: var(--white);
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .suggestion-body {
    font-size: calc(var(--w) * 0.020);
    color: var(--body);
    line-height: 1.45;
    margin-top: calc(var(--h) * 0.022);
  }
  .source-line {
    font-family: 'DM Mono', monospace;
    font-size: calc(var(--w) * 0.013);
    color: var(--attribution);
    margin-top: calc(var(--h) * 0.025);
  }

  /* Platform overrides */
  [data-platform="instagram"] .left > .gsi-wordmark { display: none; }
  [data-platform="bluesky"]   .left > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .left > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .shift-lockup { display: none; }
  [data-platform="linkedin"]  .gsi-lead { display: flex; }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>

    <div class="left">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
      <div class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </div>
      <div class="gsi-lead">
        <div class="gsi-wordmark">
          <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
        </div>
        <div class="shift-secondary">
          <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
            <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
          </svg>
          <span class="word">Shift</span>
        </div>
      </div>

      <div>
        <div class="alert-pill">
          <div class="dot"></div>
          <span class="label">{{line_name}} · {{alert_type}}</span>
        </div>
        <div class="alert-detail">{{alert_detail}}</div>
      </div>
    </div>

    <div class="right">
      <div class="suggestion-row">
        <div class="suggestion-headline">{{suggestion_headline}}</div>
        <span class="alt-mode-icon">{{alt_mode_icon}}</span>
      </div>
      <div class="suggestion-body">{{suggestion_body}}</div>
      <div class="source-line">MBTA Realtime API · NWS Boston</div>
    </div>
  </div>
</body>
</html>
