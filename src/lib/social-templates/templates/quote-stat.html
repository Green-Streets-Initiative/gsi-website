<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #BAF14D;
    --blue: #2966E5;
    --navy: #191A2E;
    --card: #242538;
    --white: #FFFFFF;
    --body: #E8E8EE;
    --secondary: rgba(255,255,255,0.7);
    --attribution: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);

    --w: {{__width__}}px;
    --h: {{__height__}}px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: var(--w); height: var(--h);
    overflow: hidden;
    background: var(--navy);
    font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  /* Compact horizontal split — left column (logo/tag/source) + right
     column (big number + body), both filling the canvas. Designed for
     1.91:1 (1200×628). */
  .template {
    width: 100%; height: 100%;
    display: flex;
    padding: calc(var(--h) * 0.07) calc(var(--w) * 0.04);
    position: relative; overflow: hidden;
    gap: calc(var(--w) * 0.03);
  }

  .accent-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--green), var(--blue));
  }

  /* Left column */
  .left {
    display: flex; flex-direction: column;
    justify-content: space-between;
    min-width: calc(var(--w) * 0.18);
    flex-shrink: 0;
  }

  .shift-lockup { display: flex; align-items: center; gap: 9px; }
  .shift-lockup .word {
    font-weight: 800;
    font-size: calc(var(--w) * 0.028);
    letter-spacing: -0.04em;
    color: var(--white);
    line-height: 1;
  }
  .shift-lockup svg { width: calc(var(--w) * 0.035); height: auto; }
  .gsi-wordmark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: calc(var(--w) * 0.016);
    letter-spacing: 0.5px;
  }
  .gsi-wordmark .green-streets { font-weight: 700; color: #52B788; }
  .gsi-wordmark .initiative { font-weight: 400; color: var(--white); }
  .gsi-lead { display: none; flex-direction: column; gap: 5px; }
  .gsi-lead .gsi-wordmark { font-size: calc(var(--w) * 0.018); }
  .gsi-lead .shift-secondary { display: flex; align-items: center; gap: 6px; opacity: 0.75; }
  .gsi-lead .shift-secondary svg { width: calc(var(--w) * 0.022); height: auto; }
  .gsi-lead .shift-secondary .word {
    font-size: calc(var(--w) * 0.016);
    color: var(--body);
    font-weight: 700;
  }

  .left-bottom {
    display: flex; flex-direction: column; gap: 6px;
  }
  .category-tag {
    font-size: calc(var(--w) * 0.018);
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green);
    text-transform: uppercase;
  }
  .source-line {
    font-family: 'DM Mono', monospace;
    font-size: calc(var(--w) * 0.013);
    color: var(--secondary);
  }

  /* Right column — big number + body, right-aligned */
  .right {
    margin-left: auto;
    display: flex; flex-direction: column;
    justify-content: center;
    text-align: right;
    max-width: calc(var(--w) * 0.62);
  }
  .headline-number {
    font-size: calc(var(--w) * 0.085);
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .headline-unit {
    font-size: calc(var(--w) * 0.028);
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
    margin-top: calc(var(--h) * 0.018);
  }
  .body-text {
    font-size: calc(var(--w) * 0.022);
    color: var(--body);
    margin-top: calc(var(--h) * 0.025);
    line-height: 1.45;
  }

  /* Platform overrides */
  [data-platform="instagram"] .left > .gsi-wordmark { display: none; }
  [data-platform="bluesky"]   .left > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .left > .gsi-wordmark { display: none; }
  [data-platform="linkedin"]  .shift-lockup { display: none; }
  [data-platform="linkedin"]  .gsi-lead { display: flex; }
</style>
</head>
<body>
  <div class="template" data-platform="{{__platform__}}" data-ratio="{{__ratio__}}">
    <div class="accent-stripe"></div>

    <div class="left">
      <div class="shift-lockup">
        <span class="word">Shift</span>
        <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
          <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
        </svg>
      </div>
      <div class="gsi-wordmark">
        <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
      </div>
      <div class="gsi-lead">
        <div class="gsi-wordmark">
          <span class="green-streets">Green Streets</span><span class="initiative"> Initiative</span>
        </div>
        <div class="shift-secondary">
          <svg viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,1 L16,14 L0,27 L0,20 L10,14 L0,8Z" fill="#BAF14D" />
            <path d="M19,1 L35,14 L19,27 L19,20 L29,14 L19,8Z" fill="#2966E5" />
          </svg>
          <span class="word">Shift</span>
        </div>
      </div>

      <div class="left-bottom">
        <div class="category-tag">{{category_tag}}</div>
        <div class="source-line">{{source_label}}</div>
      </div>
    </div>

    <div class="right">
      <div class="headline-number">{{headline_number}}</div>
      <div class="headline-unit">{{headline_unit}}</div>
      <div class="body-text">{{body_text}}</div>
    </div>
  </div>
</body>
</html>
