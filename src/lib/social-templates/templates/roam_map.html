<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:{{__width__}}px; height:{{__height__}}px; overflow:hidden; -webkit-font-smoothing:antialiased; }
  body { width:{{__width__}}px; height:{{__height__}}px; background:#191A2E; font-family:'Bricolage Grotesque',system-ui,sans-serif; color:#E8E8EE; }

  .card { position:relative; width:1080px; height:1350px; overflow:hidden; display:flex; flex-direction:column; }

  /* ── Map region ── */
  .map { position:relative; width:1080px; height:760px; flex:0 0 760px; background:#EDECE6; }
  .map-fade { position:absolute; left:0; right:0; bottom:0; height:160px; background:linear-gradient(180deg,rgba(25,26,46,0) 0%,#191A2E 100%); pointer-events:none; }
  .map-eyebrow {
    position:absolute; top:48px; left:56px;
    font-family:'DM Mono',monospace; font-weight:500; font-size:26px; letter-spacing:0.2em; text-transform:uppercase;
    color:#191A2E; background:#BAF14D; padding:8px 20px; border-radius:9999px;
    display:inline-flex; align-items:center; gap:10px;
  }
  .map-badge { position:absolute; top:40px; right:52px; width:132px; height:132px; filter:drop-shadow(0 10px 22px rgba(0,0,0,0.4)); }
  .map-badge-plate { position:absolute; inset:0; border-radius:50%; background:#15162a; border:4px solid var(--acc,#BAF14D); }
  .map-badge-glyph { position:absolute; inset:26%; }
  .map-badge-glyph img { width:100%; height:100%; object-fit:contain; }

  /* ── Content panel ── */
  .panel { position:relative; z-index:1; flex:1; padding:8px 56px 56px; display:flex; flex-direction:column; }
  .region { font-family:'DM Mono',monospace; font-weight:500; font-size:26px; letter-spacing:0.02em; color:#BAF14D; margin-bottom:8px; }
  .region:empty { display:none; }
  .name { font-family:'Bricolage Grotesque',serif; font-weight:800; font-size:66px; line-height:0.98; letter-spacing:-0.035em; color:#fff; margin-bottom:22px; }
  .stops { flex:1; }
  .footer { display:flex; align-items:center; justify-content:space-between; border-top:2px solid rgba(232,232,238,0.14); padding-top:26px; margin-top:16px; }
  .footer-loc { display:inline-flex; align-items:center; gap:12px; font-weight:600; font-size:28px; color:#E8E8EE; }
</style>
</head>
<body>
  <div class="card">
    <!-- Map -->
    <div class="map">
      {{map_html}}
      <div class="map-fade"></div>
      <div class="map-eyebrow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" width="26" height="26" style="vertical-align:-0.15em"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216ZM172.42,72.84l-64,32a8.05,8.05,0,0,0-3.58,3.58l-32,64A8,8,0,0,0,80,184a8.1,8.1,0,0,0,3.58-.84l64-32a8.05,8.05,0,0,0,3.58-3.58l32-64a8,8,0,0,0-10.74-10.74ZM138,138,97.89,158.11,118,118l40.15-20.07Z"/></svg>
        Roam
      </div>
      <div class="map-badge" style="--acc:{{badgeAccent}}">
        <div class="map-badge-plate"></div>
        <div class="map-badge-glyph"><img src="{{badge}}" alt="" /></div>
      </div>
    </div>

    <!-- Content -->
    <div class="panel">
      <div class="region">{{region}}</div>
      <div class="name">{{name}}</div>
      <div class="stops">{{stops_html}}</div>
      <div class="footer">
        <span class="footer-loc">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="#BAF14D" width="30" height="30" style="vertical-align:middle"><path d="M128,64a40,40,0,1,0,40,40A40,40,0,0,0,128,64Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,128Zm0-112a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.23,144.53,209,128,222Z"/></svg>
          Follow it in Shift
        </span>
        <svg width="150" viewBox="0 0 125 40" xmlns="http://www.w3.org/2000/svg" style="display:block"><text x="0" y="30" font-family="'Bricolage Grotesque','Arial Black',sans-serif" font-weight="800" font-size="34" letter-spacing="-1.36" fill="#FFFFFF">Shift</text><path d="M85,7 L101,20 L85,33 L85,26 L95,20 L85,14Z" fill="#BAF14D" /><path d="M104,7 L120,20 L104,33 L104,26 L114,20 L104,14Z" fill="#2966E5" /></svg>
      </div>
    </div>
  </div>
</body>
</html>
